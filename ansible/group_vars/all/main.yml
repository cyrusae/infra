---
# vars applied to every node

github_username: cyrusae  # ssh-import-id pulls keys from here
dotfiles_repo: git@github.com:cyrusae/a-dotfile-repo.git  # this is the actual path
dotfiles_dest: "{{ ansible_facts['env']['HOME'] }}/.dotfiles"

# stow packages to apply on servers (minimal nvim, not full lazyvim)
stow_packages:
  - zsh
  - starship
  - git
  - zellij
  - lf
  - nvim-server

default_shell: /bin/zsh

# Tailscale
# The actual key lives in vault.yml (ansible-vault encrypted).
tailscale_authkey: "{{ vault_tailscale_authkey }}"
tailscale_subnet: "192.168.4.0/24"
tailscale_exit_node: false          # overridden to true in host_vars/babbage.yml

# K3s
k3s_primary_host: babbage       # hostname of the --cluster-init node
k3s_primary_ip: 192.168.4.82    # local IP of the primary (used by secondaries to join)

# Postgres (for Terraform)
postgres_state_password: "{{ vault_postgres_state_password }}"

# Display setup
display_user: display
display_tty: tty1

display_btop_term: xterm-256color        # 'linux' is safe for any TTY; try xterm-256color for more color
display_btop_update_ms: 2000
display_btop_theme: TTY         # TTY theme is designed for 16-color terminals
display_btop_show_temps: "True"
display_btop_show_disks: "True"
display_btop_startup_delay: 3   # seconds to wait before launching (lets getty settle)

display_kiosk_url: ""           # REQUIRED -- set in host_vars. Role skips if empty.
display_kiosk_startup_delay: 10 # seconds to wait for X to settle before launching chromium
